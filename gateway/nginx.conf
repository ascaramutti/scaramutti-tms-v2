# ==========================================
# Gateway de unificación v1 + v2
# Un solo origin (http://scaramutti-tms) ruteado por prefijo de path.
# Mismo origin = localStorage compartido entre las dos SPAs (base del SSO).
# Ver docs/PLAN_UNIFICACION_SSO.md.
# ==========================================
server {
    listen 80;

    # Health propio del gateway (no depende de v1 ni v2)
    location = /gateway/health {
        access_log off;
        default_type text/plain;
        return 200 'ok';
    }

    # --- v2: API (Quarkus) ---
    # Más específico que el /api/ de v1 → nginx elige este por longest-prefix.
    # proxy_pass sin URI: reenvía el path original intacto (/api/v1/...).
    location /api/v1/ {
        proxy_pass http://scaramutti-tms-v2-backend-prod:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- v2: SPA (React, servida bajo /cotizaciones/) ---
    location /cotizaciones/ {
        proxy_pass http://scaramutti-tms-v2-frontend-prod:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Sin slash final → normalizar
    location = /cotizaciones {
        return 302 /cotizaciones/;
    }
    # /api/v1 exacto (sin slash) matchearía el /api/ de v1 → normalizar a v2.
    # 308 preserva método y body (importa para POST/PUT).
    location = /api/v1 {
        return 308 /api/v1/;
    }

    # --- v1: todo lo demás (SPA + /api/* de v1) ---
    # El nginx de v1 ya hace el proxy interno de /api/ a su backend.
    location / {
        proxy_pass http://scaramutti-tms-frontend-prod:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
