server {
    listen 80;

    # Redirects RELATIVOS: nginx no conoce el puerto externo (8085 del gateway
    # en integración, 8080 del frontend v2 en acceso directo) y los 302
    # absolutos lo perdían. El browser resuelve contra el host:puerto actual.
    absolute_redirect off;
    root /usr/share/nginx/html;
    index index.html;

    # La SPA vive bajo /cotizaciones/ (Vite base) — convivencia con v1 detrás
    # del gateway. El Dockerfile copia el dist a html/cotizaciones/ para que
    # el filesystem coincida con las URLs.
    location /cotizaciones/ {
        try_files $uri $uri/ /cotizaciones/index.html;
    }

    # Cortesía: la raíz redirige al módulo (cubre el acceso directo por el
    # hostname de v2 durante la transición; detrás del gateway la raíz es v1).
    location = / {
        return 302 /cotizaciones/;
    }

    # Cortesía de transición: bookmarks viejos a las rutas pre-/cotizaciones
    location = /login {
        return 302 /cotizaciones/login;
    }
    location = /cuenta/cambiar-contrasena {
        return 302 /cotizaciones/cuenta/cambiar-contrasena;
    }

    # Proxy al backend Quarkus
    location /api/ {
        proxy_pass http://scaramutti-tms-v2-backend-prod:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
