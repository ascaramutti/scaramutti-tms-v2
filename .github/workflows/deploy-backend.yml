name: Deploy backend to Azure

# Se dispara con cada push a main que toque el backend (o este workflow),
# y también se puede correr a mano desde la pestaña Actions.
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  id-token: write   # necesario para el login OIDC (sin secretos de larga vida)
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login a Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Build de la imagen del backend en el ACR. La imagen es LIMPIA: las claves
      # JWT y la contraseña de la DB ya NO van horneadas — el backend las lee de
      # Azure Key Vault en runtime, montadas como archivos en /app/keys vía el
      # secret-volume del Container App.
      - name: Build de la imagen
        run: |
          az acr build --registry ${{ secrets.ACR_NAME }} --image backend:${{ github.sha }} --target production ./backend

      # Deploy: solo cambia la imagen. El Container App conserva su identidad, el
      # secret-volume (Key Vault) y las env vars ya configurados.
      - name: Desplegar al Container App
        run: |
          az containerapp update -n backend -g ${{ secrets.RG_NAME }} --image ${{ secrets.ACR_NAME }}.azurecr.io/backend:${{ github.sha }}
