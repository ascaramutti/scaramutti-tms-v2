# Properties para perfil `test` (cargado automaticamente por `mvn test`).
# Define valores explicitos para que los tests no dependan de env vars del sistema
# ni de `.env` local. Sobreescriben los `${VAR}` de application.properties.

# --- HTTP -------------------------------------------------------------------
quarkus.http.cors.origins=http://localhost:5173

# --- DB ---------------------------------------------------------------------
# Tests apuntan a la BD dev local (compartida con `mvn quarkus:dev`).
quarkus.datasource.username=scaramutti_user
quarkus.datasource.password=dev_local_only
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/scaramutti_tms_dev

# --- JWT --------------------------------------------------------------------
mp.jwt.verify.publickey.location=keys/publickey.pem
smallrye.jwt.sign.key.location=keys/privatekey.pem
smallrye.jwt.new-token.lifespan=3600
app.jwt.refresh-token-lifespan-seconds=86400
