# =============================================================================
# Scaramutti TMS - Backend (Quarkus)
# =============================================================================

# --- HTTP -------------------------------------------------------------------
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS}

# --- API base path ----------------------------------------------------------
quarkus.http.root-path=/api/v1

# --- DB ---------------------------------------------------------------------
# TODAS las env vars son obligatorias (sin defaults). Definir en `.env`
# (dev local) o como env vars reales del sistema (CI, prod).
# Ver `.env.example` para la lista completa y `application-test.properties`
# para los valores que usan los tests.
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.jdbc.url=${DB_JDBC_URL}
quarkus.datasource.jdbc.max-size=16

# --- Hibernate ORM ----------------------------------------------------------
# El schema lo gestiona el baseline.sql, no Hibernate. NUNCA usar update/create-drop en prod.
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# --- OpenAPI / Swagger UI ---------------------------------------------------
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger
quarkus.swagger-ui.theme=original
# La spec runtime se sirve EXCLUSIVAMENTE desde META-INF/openapi.yaml (single source).
# Desactivamos el scan de anotaciones JAX-RS para evitar paths duplicados (con y sin
# /api/v1) y schemas autogenerados que no coinciden con el contrato.
mp.openapi.scan.disable=true

# --- JWT (RS256) ------------------------------------------------------------
# En prod, montar las keys como secret/volume y apuntar las env vars al path real.
# Verificacion (validar tokens entrantes) - usa la clave publica
mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_LOCATION}
mp.jwt.verify.issuer=scaramutti-tms
mp.jwt.verify.audiences=scaramutti-tms-app

# Emision (crear tokens al hacer login) - usa la clave privada
smallrye.jwt.sign.key.location=${JWT_PRIVATE_KEY_LOCATION}
smallrye.jwt.new-token.issuer=scaramutti-tms
smallrye.jwt.new-token.audience=scaramutti-tms-app

# Lifespans en segundos.
smallrye.jwt.new-token.lifespan=${ACCESS_TOKEN_LIFESPAN_SECONDS}
app.jwt.refresh-token-lifespan-seconds=${REFRESH_TOKEN_LIFESPAN_SECONDS}

# --- Security (HTTP authn/authz) --------------------------------------------
# Politica por default: denegar todo dentro de /api/v1/*. Endpoints publicos se listan aca.
# Nota 1: las paths se evaluan contra el URL completo (incluyendo el root-path /api/v1).
# Nota 2: /openapi y /swagger viven en root (fuera de /api/v1/*), por eso no entran al filtro.
quarkus.http.auth.proactive=false
quarkus.http.auth.permission.public-paths.paths=/api/v1/auth/login,/api/v1/auth/refresh,/api/v1/q/health,/api/v1/q/health/*
quarkus.http.auth.permission.public-paths.policy=permit
quarkus.http.auth.permission.protected-paths.paths=/api/v1/*
quarkus.http.auth.permission.protected-paths.policy=authenticated

# --- Logging ----------------------------------------------------------------
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.level=INFO
quarkus.log.category."com.scaramutti".level=DEBUG

# --- Produccion (perfil prod) -----------------------------------------------
%prod.quarkus.hibernate-orm.log.sql=false
%prod.quarkus.log.category."com.scaramutti".level=INFO
